<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Coder's Cozy Coding Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a1a;
            overflow: hidden;
        }

        /* Subtle animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(120, 60, 150, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 50%, rgba(200, 100, 150, 0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(100, 80, 180, 0.1) 0%, transparent 50%);
            animation: bgDrift 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(30px, -20px) rotate(3deg); }
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 2rem;
        }

        .title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 8vw, 6rem);
            line-height: 1.3;
            color: #e8c4f0;
            animation: breathe 4s ease-in-out infinite;
            text-shadow:
                0 0 10px rgba(200, 140, 220, 0.5),
                0 0 20px rgba(200, 140, 220, 0.3),
                0 0 40px rgba(200, 140, 220, 0.2),
                0 0 80px rgba(180, 100, 200, 0.1);
            user-select: none;
        }

        .title-line {
            display: block;
        }

        @keyframes breathe {
            0%, 100% {
                text-shadow:
                    0 0 10px rgba(200, 140, 220, 0.5),
                    0 0 20px rgba(200, 140, 220, 0.3),
                    0 0 40px rgba(200, 140, 220, 0.2),
                    0 0 80px rgba(180, 100, 200, 0.1);
                opacity: 0.9;
            }
            50% {
                text-shadow:
                    0 0 15px rgba(220, 160, 240, 0.8),
                    0 0 30px rgba(220, 160, 240, 0.5),
                    0 0 60px rgba(200, 120, 220, 0.4),
                    0 0 100px rgba(180, 100, 200, 0.2),
                    0 0 140px rgba(160, 80, 180, 0.1);
                opacity: 1;
            }
        }

        /* The exclamation mark dot */
        .exclamation-dot {
            display: inline-block;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .exclamation-dot:hover {
            transform: scale(1.3);
            filter: brightness(1.5);
        }

        .exclamation-dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(220, 160, 240, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease;
        }

        .exclamation-dot:hover::after {
            width: 40px;
            height: 40px;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: rgba(200, 160, 230, 0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">
            <span class="title-line">Cozy Coder's Cozy Coding Club</span>
            <span class="title-line">Coming Soon<a href="prototypes.html" class="exclamation-dot" title="">!</a></span>
        </h1>
    </div>

    <script>
        // Create floating particles
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = (Math.random() * 10 + 8) + 's';
            particle.style.width = particle.style.height = (Math.random() * 3 + 1) + 'px';
            particle.style.opacity = Math.random() * 0.5 + 0.1;
            document.body.appendChild(particle);

            particle.addEventListener('animationend', () => particle.remove());
        }

        // Spawn particles periodically
        setInterval(createParticle, 400);

        // Create initial batch
        for (let i = 0; i < 15; i++) {
            setTimeout(createParticle, Math.random() * 3000);
        }
    </script>
</body>
</html>
